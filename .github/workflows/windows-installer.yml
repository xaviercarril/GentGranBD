name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build Windows app (one-folder)
        run: |
          pyinstaller pyinstaller-win.spec --noconfirm

      - name: Install NSIS
        run: choco install nsis -y

      - name: Determine dist dir
        id: distdir
        shell: pwsh
        run: |
          $d = Get-ChildItem -Path dist -Directory | Where-Object { $_.Name -like 'GentGranBD*' } | Select-Object -First 1
          if (-not $d) { Write-Error 'No dist directory found under dist/'; exit 1 }
          echo "distdir=$($d.FullName)" >> $env:GITHUB_OUTPUT

      - name: Build NSIS installer
        run: |
          makensis -DDISTDIR="${{ steps.distdir.outputs.distdir }}" installer\installer.nsi
        working-directory: ${{ github.workspace }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GentGranBD-windows
          path: |
            ${{ steps.distdir.outputs.distdir }}
            GentGranBD-Setup-*.exe
