name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build Windows app (one-file)
        run: pyinstaller pyinstaller-win.spec --noconfirm

      - name: Install NSIS
        run: choco install nsis -y

      - name: Locate EXE
        id: findexe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist -Filter GentGranBD.exe -File -Recurse | Select-Object -First 1
          if (-not $exe) { Write-Error 'No GentGranBD.exe found under dist/'; exit 1 }
          "exepath=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build NSIS installer (one-file)
        run: makensis -DAPP_EXE="${{ steps.findexe.outputs.exepath }}" installer\installer.nsi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GentGranBD-windows
          path: |
            ${{ steps.findexe.outputs.exepath }}
            GentGranBD-Setup-*.exe
