name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build Windows app (one-file)
        run: pyinstaller pyinstaller-win.spec --noconfirm

      - name: Install NSIS
        run: choco install nsis -y

      - name: Add NSIS to PATH
        shell: pwsh
        run: |
          $nsis = Join-Path ${env:ProgramFiles(x86)} 'NSIS'
          if (-not (Test-Path $nsis)) { $nsis = Join-Path ${env:ProgramFiles} 'NSIS' }
          if (-not (Test-Path $nsis)) { Write-Error 'NSIS not found after install'; exit 1 }
          $nsis | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Locate one-file EXE
        id: findexe
        shell: pwsh
        run: |
          $exePath = Join-Path $PWD 'dist\GentGranBD.exe'
          if (-not (Test-Path $exePath -PathType Leaf)) {
            Write-Error 'Expected one-file build at dist\GentGranBD.exe. Refusing to package a one-folder stub without its runtime DLLs.'
            exit 1
          }
          "exepath=$exePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build NSIS installer (one-file)
        run: makensis -DAPP_EXE="${{ steps.findexe.outputs.exepath }}" installer\installer.nsi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GentGranBD-windows
          path: |
            ${{ steps.findexe.outputs.exepath }}
            GentGranBD-Setup-*.exe
