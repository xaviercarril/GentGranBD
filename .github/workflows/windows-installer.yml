name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

        - name: Build Windows app (one-file)
          run: |
            pyinstaller pyinstaller-win.spec --noconfirm
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

  - name: Build Windows app (one-file)
        - name: Locate EXE
          id: findexe
          shell: pwsh
          run: |
            $exe = Get-ChildItem -Path dist -Filter GentGranBD.exe -File -Recurse | Select-Object -First 1
            if (-not $exe) { Write-Error 'No GentGranBD.exe found under dist/'; exit 1 }
            "exepath=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        id: findexe
        - name: Build NSIS installer (one-file)
          run: |
            makensis -DAPP_EXE="${{ steps.findexe.outputs.exepath }}" installer\installer.nsi
          working-directory: ${{ github.workspace }}
          echo "exepath=$($exe.FullName)" >> $env:GITHUB_OUTPUT

    - name: Build NSIS installer (one-file)
        run: |
      makensis -DAPP_EXE="${{ steps.findexe.outputs.exepath }}" installer\installer.nsi
        working-directory: ${{ github.workspace }}
              ${{ steps.findexe.outputs.exepath }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GentGranBD-windows
          path: |
            ${{ steps.findexe.outputs.exepath }}
            GentGranBD-Setup-*.exe
