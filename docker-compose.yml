services:
  postgres:
    image: postgres:16
    container_name: gentgran-postgres-poc
    restart: unless-stopped
    environment:
      POSTGRES_DB: gentgran_poc
      POSTGRES_USER: gentgran
      POSTGRES_PASSWORD: gentgran_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gentgran -d gentgran_poc"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
